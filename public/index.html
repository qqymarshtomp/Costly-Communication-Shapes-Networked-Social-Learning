<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Networked Inference</title>
  <style>
    body { font-family: sans-serif; max-width: 900px; margin: 24px auto; }
    .box { border: 1px solid #ddd; padding: 12px; margin: 12px 0; }
    #messages { height: 160px; overflow: auto; border: 1px solid #eee; padding: 8px; }
    button { padding: 8px 10px; }
  </style>
</head>
<body>
  <h2>Networked Inference Task</h2>

  <div class="box" id="statusBox">
    <div id="status">Not connected.</div>
    <button id="joinBtn">Join</button>
  </div>

  <div class="box" id="taskBox" style="display:none;">
    <div><b>Group:</b> <span id="groupId"></span> | <b>Round:</b> <span id="round"></span> | <b>Cost per message:</b> <span id="cost"></span> | <b>Reward:</b> <span id="reward"></span></div>
    <div style="margin-top:8px;"><b>Your private signal p:</b> <span id="privateP"></span></div>
    <div style="margin-top:8px;"><b>Your neighbors (indices):</b> <span id="neighbors"></span></div>

    <div style="margin-top:12px;">
      <label>Your current belief p:
        <input id="beliefSlider" type="range" min="0.01" max="0.99" step="0.01" value="0.50">
        <span id="beliefVal">0.50</span>
      </label>
      <button id="submitBeliefBtn">Submit belief</button>
    </div>

    <div style="margin-top:12px;">
      <button id="sendMsgBtn">Send message (your current p)</button>
      <span id="msgInfo"></span>
    </div>

    <div style="margin-top:12px;">
      <div><b>Incoming messages</b></div>
      <div id="messages"></div>
    </div>

    <div style="margin-top:12px;">
      <b>Final guess</b>
      <button id="final0">Guess S=0</button>
      <button id="final1">Guess S=1</button>
      <span id="finalAck"></span>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="client.js"></script>
</body>
</html>
